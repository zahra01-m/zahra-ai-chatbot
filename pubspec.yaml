name: zahrachatbot
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  google_sign_in: ^6.2.0

  # AI & Networking
  http: ^1.2.0
  flutter_markdown: ^0.7.3+2

  # Files & Media
  file_picker: ^11.0.2
  image_picker: ^1.1.0
  syncfusion_flutter_pdf: ^28.1.33
  speech_to_text: ^7.0.0
  archive: ^3.6.1        # DOCX / ZIP extraction

  # Utilities
  path_provider: ^2.1.0
  share_plus: ^12.0.2
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - .env